
    spring:
      datasource:
        url: jdbc:postgresql://localhost:5433/to-do-management-system
        username: postgres
        password: 1234
        driver-class-name: org.postgresql.Driver

      jpa:
        hibernate:
          ddl-auto: update
        show-sql: true
        database-platform: org.hibernate.dialect.PostgreSQLDialect

      sql:
        init:
          mode: always
